<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта правил UserGate NGFW</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #cy { flex: 1; background-color: #fafafa; border: 1px solid #ccc; }
        .toolbar { padding: 8px; background: #eee; display: flex; gap: 10px; }
        button { padding: 6px 12px; cursor: pointer; }
    </style>
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
</head>
<body>
    <div class="toolbar">
        <button onclick="resetView()">Сбросить вид</button>
        <button onclick="highlightAllow()">Только разрешающие</button>
        <button onclick="highlightDeny()">Только запрещающие</button>
        <button onclick="showAll()">Все правила</button>
        <span>💡 Нажмите на узел, чтобы подсветить связанные правила.</span>
    </div>
    <div id="cy"></div>

    <script>
        fetch('/api/graph')
            .then(res => res.json())
            .then(data => {
                initCytoscape(data.elements);
            });

        let cy;

        function initCytoscape(elements) {
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    {
                        selector: 'node[type="zone"]',
                        style: {
                            'background-color': '#e0e0e0',
                            'border-width': 2,
                            'border-color': '#666',
                            'label': 'data(label)',
                            'font-size': 14,
                            'font-weight': 'bold',
                            'text-valign': 'top',
                            'text-halign': 'center',
                            'padding': 10,
                            'shape': 'round-rectangle',
                            'width': 'label',
                            'height': 'label',
                            'text-margin-y': -5,
                        }
                    },
                    {
                        selector: 'node[parent]',
                        style: {
                            'background-color': '#fff',
                            'border-width': 1.5,
                            'border-color': '#888',
                            'label': 'data(label)',
                            'font-size': 11,
                            'text-valign': 'center',
                            'padding': 6,
                            'shape': 'ellipse',
                            'width': 'label',
                            'height': 'label',
                        }
                    },
                    {
                        selector: 'edge[action="allow"]',
                        style: {
                            'line-color': '#4caf50',
                            'target-arrow-color': '#4caf50',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'width': 3,
                            'label': 'data(label)',
                            'font-size': 9,
                            'color': '#4caf50',
                            'text-background-color': '#fff',
                            'text-background-opacity': 0.7,
                        }
                    },
                    {
                        selector: 'edge[action="deny"]',
                        style: {
                            'line-color': '#f44336',
                            'target-arrow-color': '#f44336',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'width': 3,
                            'label': 'data(label)',
                            'font-size': 9,
                            'color': '#f44336',
                            'text-background-color': '#fff',
                            'text-background-opacity': 0.7,
                        }
                    },
                    {
                        selector: 'edge:hover',
                        style: { 'width': 5 }
                    },
                    {
                        selector: 'node:hover',
                        style: { 'border-color': '#03a9f4', 'border-width': 3 }
                    }
                ],
                layout: {
                    name: 'cose-bilkent',
                    animate: false,
                    fit: true,
                    padding: 30,
                    nodeRepulsion: 4000,
                    idealEdgeLength: 120,
                    nodeDimensionsIncludeLabels: true,
                }
            });

            cy.on('tap', 'node', function(evt) {
                const node = evt.target;
                cy.edges().removeStyle();
                cy.nodes().removeStyle();
                const connectedEdges = node.connectedEdges();
                connectedEdges.style({
                    'line-color': '#ff9800',
                    'target-arrow-color': '#ff9800',
                    'width': 5
                });
                const neighbors = node.neighborhood().nodes();
                neighbors.style({
                    'border-color': '#ff9800',
                    'border-width': 3
                });
                node.style({
                    'border-color': '#ff5722',
                    'border-width': 4
                });
            });

            cy.on('tap', function(evt) {
                if (evt.target === cy) {
                    cy.edges().removeStyle();
                    cy.nodes().removeStyle();
                }
            });
        }

        function resetView() { cy.fit(); cy.edges().removeStyle(); cy.nodes().removeStyle(); }
        function highlightAllow() { cy.edges().hide(); cy.edges('[action="allow"]').show(); }
        function highlightDeny() { cy.edges().hide(); cy.edges('[action="deny"]').show(); }
        function showAll() { cy.edges().show(); }
    </script>
</body>
</html>

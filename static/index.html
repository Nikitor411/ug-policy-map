<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта правил UserGate NGFW</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #cy { flex: 1; background-color: #fafafa; border: 1px solid #ccc; }
        .toolbar { padding: 8px; background: #eee; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 6px 12px; cursor: pointer; }
    </style>
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
</head>
<body>
    <div class="toolbar">
        <button id="btnReset">Сбросить вид</button>
        <button id="btnAllow">Только разрешающие</button>
        <button id="btnDeny">Только запрещающие</button>
        <button id="btnAll">Все правила</button>
        <span>💡 Нажмите на узел, чтобы подсветить связанные правила.</span>
    </div>
    <div id="cy"></div>

    <script>
        (function() {
            fetch('/api/graph')
                .then(res => {
                    if (!res.ok) throw new Error('Ошибка загрузки данных: ' + res.status);
                    return res.json();
                })
                .then(data => {
                    console.log('Данные графа загружены');
                    initCytoscape(data.elements);
                })
                .catch(err => console.error('Ошибка:', err));
        })();

        let cy;

        function initCytoscape(elements) {
            if (typeof cytoscape === 'undefined') {
                console.error('Cytoscape.js не загрузилась');
                return;
            }

            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    // Стиль для родительских узлов (зон)
                    {
                        selector: 'node[type="zone"]',
                        style: {
                            'background-color': '#e0e0e0',
                            'border-width': 2,
                            'border-color': '#666',
                            'label': 'data(label)',
                            'font-size': 14,
                            'font-weight': 'bold',
                            'text-valign': 'top',
                            'text-halign': 'center',
                            'padding': 10,
                            'shape': 'round-rectangle',
                            'width': 120,
                            'height': 60,
                            'text-margin-y': -5,
                        }
                    },
                    // Стиль для дочерних узлов внутри зон
                    {
                        selector: 'node[parent]',
                        style: {
                            'background-color': '#fff',
                            'border-width': 1.5,
                            'border-color': '#888',
                            'label': 'data(label)',
                            'font-size': 11,
                            'text-valign': 'center',
                            'padding': 6,
                            'shape': 'ellipse',
                            'width': 80,
                            'height': 40,
                        }
                    },
                    // Стиль для разрешающих рёбер
                    {
                        selector: 'edge[action="allow"]',
                        style: {
                            'line-color': '#4caf50',
                            'target-arrow-color': '#4caf50',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'width': 3,
                            'label': 'data(label)',
                            'font-size': 9,
                            'color': '#4caf50',
                            'text-background-color': '#fff',
                            'text-background-opacity': 0.7,
                        }
                    },
                    // Стиль для запрещающих рёбер
                    {
                        selector: 'edge[action="deny"]',
                        style: {
                            'line-color': '#f44336',
                            'target-arrow-color': '#f44336',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'width': 3,
                            'label': 'data(label)',
                            'font-size': 9,
                            'color': '#f44336',
                            'text-background-color': '#fff',
                            'text-background-opacity': 0.7,
                        }
                    }
                ],
                layout: {
                    name: 'cose',          // Встроенный force-directed layout
                    fit: true,
                    padding: 30,
                    nodeRepulsion: 4000,
                    idealEdgeLength: 120,
                    nodeDimensionsIncludeLabels: true,
                    animate: false
                }
            });

            // Подсветка рёбер и соседей при наведении мыши (замена :hover)
            cy.on('mouseover', 'node', function(evt) {
                const node = evt.target;
                node.connectedEdges().style({
                    'line-color': '#ff9800',
                    'target-arrow-color': '#ff9800',
                    'width': 5
                });
                node.neighborhood().nodes().style({
                    'border-color': '#ff9800',
                    'border-width': 3
                });
                node.style({
                    'border-color': '#ff5722',
                    'border-width': 4
                });
            });

            cy.on('mouseout', 'node', function(evt) {
                const node = evt.target;
                // Возвращаем исходные стили, просто удаляя переопределения
                cy.edges().removeStyle();
                cy.nodes().removeStyle();
            });

            // Выделение по клику (оранжевое) остаётся
            cy.on('tap', 'node', function(evt) {
                cy.edges().removeStyle();
                cy.nodes().removeStyle();
                const node = evt.target;
                const connectedEdges = node.connectedEdges();
                connectedEdges.style({
                    'line-color': '#ff9800',
                    'target-arrow-color': '#ff9800',
                    'width': 5
                });
                const neighbors = node.neighborhood().nodes();
                neighbors.style({
                    'border-color': '#ff9800',
                    'border-width': 3
                });
                node.style({
                    'border-color': '#ff5722',
                    'border-width': 4
                });
            });

            // Сброс по клику на фон
            cy.on('tap', function(evt) {
                if (evt.target === cy) {
                    cy.edges().removeStyle();
                    cy.nodes().removeStyle();
                }
            });

            // Привязываем кнопки
            document.getElementById('btnReset').addEventListener('click', function() {
                cy.fit();
                cy.edges().removeStyle();
                cy.nodes().removeStyle();
            });
            document.getElementById('btnAllow').addEventListener('click', function() {
                cy.edges().hide();
                cy.edges('[action="allow"]').show();
            });
            document.getElementById('btnDeny').addEventListener('click', function() {
                cy.edges().hide();
                cy.edges('[action="deny"]').show();
            });
            document.getElementById('btnAll').addEventListener('click', function() {
                cy.edges().show();
            });
        }
    </script>
</body>
</html>
